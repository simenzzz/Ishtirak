name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B verify

  analytics-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  gateway-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm audit --omit=dev --audit-level=high
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run lint
      - run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate stack secrets
        working-directory: infra
        run: |
          cp .env.example .env
          {
            echo "JWT_SECRET=$(openssl rand -base64 48)"
            echo "GATEWAY_SERVICE_TOKEN_SECRET=$(openssl rand -base64 48)"
            echo "GATEWAY_ANALYTICS_SERVICE_TOKEN_SECRET=$(openssl rand -base64 48)"
            echo "ANALYTICS_SERVICE_TOKEN_SECRET=$(openssl rand -base64 48)"
            echo "CORE_JAVA_PROFILES=dev"
            echo "DEMO_PASSWORD=ishtirak-demo-password"
          } >> .env
      - name: Bring up the stack
        working-directory: infra
        run: docker compose up -d --build
      - name: Wait for the stack to be ready (real login through the gateway)
        working-directory: infra
        env:
          DEMO_PASSWORD: ishtirak-demo-password
        run: ./wait-for-login.sh
      - name: Install Playwright
        working-directory: web
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: web
        env:
          DEMO_PASSWORD: ishtirak-demo-password
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e
      - name: Collect stack logs
        if: always()
        working-directory: infra
        run: docker compose logs > ../e2e-stack.log; docker compose down -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            web/playwright-report
            e2e-stack.log

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pinned for reproducible lint results and to avoid executing an
      # unvetted newest release on every CI run (supply-chain hygiene).
      - name: Lint OpenAPI specs
        run: npx --yes @redocly/cli@2.34.0 lint --config contracts/redocly.yaml contracts/openapi/*.openapi.yaml
      - name: Validate AsyncAPI spec
        run: npx --yes @asyncapi/cli@6.0.2 validate contracts/asyncapi.yaml
