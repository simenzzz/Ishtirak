openapi: 3.1.0
info:
  title: Ishtirak gateway (public BFF)
  version: 0.1.0
  description: >
    The public API the web client consumes (ADR-003). The gateway authenticates
    every request (Bearer JWT), derives operatorId + role from the token, and
    aggregates/proxies to the internal core-java and analytics-python services.
    All resources are implicitly scoped to the caller's operator — clients never
    pass operatorId.


    The real-time channel (`GET /api/ws`, WebSocket upgrade) is **not** modeled
    in OpenAPI; its protocol lives in ../asyncapi.yaml and ../../docs/API.md.


    **Design-ahead-of-implementation:** only `/health` and `/ready` are built
    today (`x-status: built`); everything else is `x-status: built`.
  contact: { name: Ishtirak, url: https://ishtirak.dev }
servers:
  - url: http://localhost:8080
    description: Local / docker-compose (public)

security:
  - bearerAuth: []

tags:
  - { name: auth }
  - { name: subscribers }
  - { name: tiers }
  - { name: readings }
  - { name: billing }
  - { name: payments }
  - { name: outages }
  - { name: analytics }
  - { name: health }

paths:
  /api/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Exchange email/password credentials
      description: >
        Rate-limited (brute-force / credential-stuffing protection). The
        `password` field MUST never be logged (the gateway uses pino-http
        request logging — redact this body). Users are global by email and may
        have multiple operator memberships; multi-membership logins return a
        short-lived selection token instead of context-bound access tokens.
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password:
                  type: string
                  format: password
                  description: Never logged or echoed back.
      responses:
        '200':
          description: >
            Authenticated or context selection required. On a direct (single
            membership) login the rotating refresh token is returned as an
            HttpOnly `Set-Cookie` (`ishtirak.refresh`), never in the body; the
            short-lived access token is in the body for in-memory use.
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie set on direct login.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [contextSelectionRequired, memberships]
                properties:
                  contextSelectionRequired: { type: boolean }
                  selectionToken: { type: string }
                  accessToken: { type: string }
                  memberships:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required: [membershipId, operatorId, operatorName, role]
                      properties:
                        membershipId: { type: string, format: uuid }
                        operatorId: { type: string, format: uuid }
                        operatorName: { type: string }
                        role: { type: string, enum: [OPERATOR_ADMIN, OPERATOR_STAFF, SUBSCRIBER] }
                        subscriberId: { type: string, format: uuid }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '429': { $ref: 'components.yaml#/components/responses/TooManyRequests' }

  /api/auth/select-context:
    post:
      tags: [auth]
      operationId: selectAuthContext
      summary: Select an operator membership
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [selectionToken, membershipId]
              properties:
                selectionToken: { type: string }
                membershipId: { type: string, format: uuid }
      responses:
        '200':
          description: >
            Context-bound access token in the body; the rotating refresh token is
            set as an HttpOnly `Set-Cookie` (`ishtirak.refresh`).
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [accessToken]
                properties:
                  accessToken: { type: string }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      summary: Refresh an access token
      description: >
        Authenticated solely by the HttpOnly `ishtirak.refresh` cookie — there is
        no request body. The gateway reads the cookie, forwards it to core-java,
        and sets the rotated refresh token as a new HttpOnly cookie. Refresh
        tokens are single-use and rotated on each refresh; detecting reuse of a
        consumed token revokes the token family (theft mitigation). Rate-limited.
      x-status: built
      security: []
      responses:
        '200':
          description: New access token in the body; rotated refresh token in the cookie.
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh-token cookie.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [accessToken]
                properties:
                  accessToken: { type: string }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '429': { $ref: 'components.yaml#/components/responses/TooManyRequests' }

  /api/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Log out — clear the cookie and revoke the refresh-token family
      description: >
        Clears the HttpOnly `ishtirak.refresh` cookie in the browser and, when a
        refresh cookie was present, calls core-java to revoke the whole refresh-token
        family server-side (best-effort: revocation failure is logged but still
        returns 204, so logout always succeeds for the browser). Idempotent;
        succeeds whether or not a session was active. Rate-limited.
      x-status: built
      security: []
      responses:
        '204':
          description: Cookie cleared.
          headers:
            Set-Cookie:
              description: Expired refresh-token cookie.
              schema: { type: string }
        '429': { $ref: 'components.yaml#/components/responses/TooManyRequests' }

  /api/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Current identity (operator, role)
      x-status: built
      responses:
        '200':
          description: The authenticated identity.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [operatorId, role]
                properties:
                  operatorId: { type: string, format: uuid }
                  subscriberId: { type: string, format: uuid, description: Present when the caller is a SUBSCRIBER. }
                  role: { type: string, enum: [OPERATOR_ADMIN, OPERATOR_STAFF, SUBSCRIBER] }
                  name: { type: string }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /api/subscribers:
    get:
      tags: [subscribers]
      operationId: apiListSubscribers
      summary: List subscribers (paginated)
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      parameters:
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of subscribers.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Subscriber' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
    post:
      tags: [subscribers]
      operationId: apiCreateSubscriber
      summary: Create a subscriber
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, tierId]
              properties:
                name: { type: string }
                tierId: { type: string, format: uuid }
                meterId: { type: string }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/subscribers/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [subscribers]
      operationId: apiGetSubscriber
      summary: Get a subscriber
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      responses:
        '200':
          description: Subscriber.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
    patch:
      tags: [subscribers]
      operationId: apiUpdateSubscriber
      summary: Update a subscriber
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                name: { type: string }
                tierId: { type: string, format: uuid }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Updated subscriber.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/subscribers/{id}/readings:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/pageParam'
      - $ref: 'components.yaml#/components/parameters/limitParam'
    get:
      tags: [readings]
      operationId: apiListSubscriberReadings
      summary: Reading history for a subscriber
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      responses:
        '200':
          description: Page of readings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Reading' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/tiers:
    get:
      tags: [tiers]
      operationId: apiListTiers
      summary: List amperage tiers
      x-status: built
      responses:
        '200':
          description: Tiers.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Tier' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
    post:
      tags: [tiers]
      operationId: apiCreateTier
      summary: Create an amperage tier and tariff override
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, amperage, standingFeeUsd, standingFeeLbp, perKwhRateUsd, perKwhRateLbp]
              properties:
                name: { type: string }
                amperage: { type: integer, minimum: 1 }
                tariffPolicyOverride:
                  oneOf:
                    - { $ref: 'components.yaml#/components/schemas/TariffPolicy' }
                    - { type: 'null' }
                standingFeeUsd: { type: number, minimum: 0 }
                standingFeeLbp: { type: integer, minimum: 0 }
                perKwhRateUsd: { type: number, minimum: 0 }
                perKwhRateLbp: { type: integer, minimum: 0 }
      responses:
        '201':
          description: Created tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/tiers/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [tiers]
      operationId: apiGetTier
      summary: Get a tier
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      responses:
        '200':
          description: Tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
    patch:
      tags: [tiers]
      operationId: apiUpdateTier
      summary: Update tier pricing, policy override, or status
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                name: { type: string }
                amperage: { type: integer, minimum: 1 }
                tariffPolicyOverride:
                  oneOf:
                    - { $ref: 'components.yaml#/components/schemas/TariffPolicy' }
                    - { type: 'null' }
                standingFeeUsd: { type: number, minimum: 0 }
                standingFeeLbp: { type: integer, minimum: 0 }
                perKwhRateUsd: { type: number, minimum: 0 }
                perKwhRateLbp: { type: integer, minimum: 0 }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Updated tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/readings:
    post:
      tags: [readings]
      operationId: apiRecordReading
      summary: Record a meter reading
      description: Proxies to core-java, which emits `reading.recorded`.
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [subscriberId, kwh, readingAt]
              properties:
                subscriberId: { type: string, format: uuid }
                kwh: { type: number, minimum: 0 }
                readingAt: { type: string, format: date-time }
      responses:
        '201':
          description: Recorded reading.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Reading' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/billing-runs:
    post:
      tags: [billing]
      operationId: apiRunBilling
      summary: Trigger the monthly billing run
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [periodStart, periodEnd]
              properties:
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
      responses:
        '202':
          description: Billing run accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [issued, periodStart, periodEnd]
                properties:
                  issued: { type: integer, minimum: 0 }
                  periodStart: { type: string, format: date }
                  periodEnd: { type: string, format: date }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '409': { $ref: 'components.yaml#/components/responses/Conflict' }

  /api/invoices:
    get:
      tags: [billing]
      operationId: apiListInvoices
      summary: List invoices
      x-status: built
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [ISSUED, PARTIAL, PAID, VOID] } }
        - { name: periodStart, in: query, required: false, schema: { type: string, format: date } }
        - { name: periodEnd, in: query, required: false, schema: { type: string, format: date } }
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of invoices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Invoice' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/invoices/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [billing]
      operationId: apiGetInvoice
      summary: Get an invoice
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      responses:
        '200':
          description: Invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/invoices/{id}/payments:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [payments]
      operationId: apiListInvoicePayments
      summary: Payments recorded against an invoice
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      responses:
        '200':
          description: Payments for the invoice.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Payment' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/me/invoices:
    get:
      tags: [billing]
      operationId: apiListMyInvoices
      summary: The caller's own invoices (subscriber portal)
      x-status: built
      x-required-roles: [SUBSCRIBER]
      parameters:
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of the subscriber's invoices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Invoice' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /api/me/readings:
    get:
      tags: [readings]
      operationId: apiListMyReadings
      summary: The caller's own readings (subscriber portal)
      x-status: built
      x-required-roles: [SUBSCRIBER]
      parameters:
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of the subscriber's readings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Reading' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /api/me/invoices/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [billing]
      operationId: apiGetMyInvoice
      summary: One invoice owned by the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/me/invoices/{id}/payments:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
    get:
      tags: [payments]
      operationId: apiListMyInvoicePayments
      summary: Payments for one invoice owned by the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Payments for the invoice.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Payment' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/payments:
    post:
      tags: [payments]
      operationId: apiRecordPayment
      summary: Record a payment against an invoice
      description: Proxies to core-java, which emits `payment.received`.
      x-status: built
      x-required-roles: [OPERATOR_ADMIN, OPERATOR_STAFF]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [invoiceId, currency, tenderedAmount, method]
              properties:
                invoiceId: { type: string, format: uuid }
                currency: { $ref: 'components.yaml#/components/schemas/Currency' }
                tenderedAmount: { type: number, minimum: 0 }
                method: { type: string, enum: [CASH, WHISH] }
      responses:
        '201':
          description: Recorded payment.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Payment' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /api/outages:
    get:
      tags: [outages]
      operationId: apiListOutages
      summary: Scheduled / active outages (operator or subscriber view)
      x-status: built
      responses:
        '200':
          description: Outages.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Outage' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
    post:
      tags: [outages]
      operationId: apiScheduleOutage
      summary: Schedule a load-shedding window
      description: Proxies to core-java, which emits `outage.scheduled`.
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [startsAt, endsAt, reason]
              properties:
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
                reason: { type: string, enum: [FUEL, MAINTENANCE, GRID, OTHER] }
      responses:
        '201':
          description: >
            Scheduled outage. Proxies core-java's create response, which mirrors
            the emitted `outage.scheduled` event payload (`outageId`, not `id`).
          content:
            application/json:
              schema: { $ref: '../events/outage-scheduled.schema.json#/properties/payload' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

