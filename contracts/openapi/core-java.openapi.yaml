openapi: 3.1.0
info:
  title: Ishtirak core-java (system of record)
  version: 0.1.0
  description: >
    Internal REST API for the system-of-record service (ADR-004). Consumed by
    the gateway, not exposed to the browser. Mutations run in a DB transaction
    and emit the corresponding domain event **after commit** (see `x-emits-event`).


    **Internal trust boundary (ADR-003).** This service is not browser-reachable
    (`x-internal`). It accepts a gateway-signed service token (`gatewayServiceAuth`),
    never the raw end-user JWT. The end-user identity arrives as the gateway-injected
    trusted headers `X-Operator-Id` + `X-Actor-Role` (required on every non-health
    operation). The service token's `operatorId`, `role`, and optional `subscriberId`
    claims must match those headers. **Every query MUST filter by `X-Operator-Id`**
    and enforce the role in `X-Actor-Role`; a request missing or mismatching these
    values is rejected. This is where multi-tenant isolation is enforced — see
    CLAUDE.md.


    **Status:** core-java is built through Phase 2 — every operation here is
    implemented and tested (`x-status: built`). The human-readable companion is
    ../../docs/API.md; events are defined in ../events/*.schema.json.
  contact: { name: Ishtirak, url: https://ishtirak.dev }
servers:
  - url: http://localhost:8081
    description: Local / docker-compose (internal — not exposed to the browser)
    x-internal: true

security:
  - gatewayServiceAuth: []

tags:
  - { name: auth }
  - { name: subscribers }
  - { name: tiers }
  - { name: readings }
  - { name: billing }
  - { name: payments }
  - { name: outages }
  - { name: health }

paths:
  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Exchange email/password credentials
      description: >
        core-java is the token issuer. Returns access/refresh tokens directly
        when the user has a single membership, or a short-lived selection token
        plus the available memberships when context selection is required.
        Public — no service token or identity headers (the gateway fronts this
        as `/api/auth/login` in Phase 4).
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Tokens, or a selection token plus memberships.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResult' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /auth/select-context:
    post:
      tags: [auth]
      operationId: selectContext
      summary: Exchange a selection token + membership id for tokens
      description: >
        Completes login for a multi-membership user. Public — no service token
        or identity headers.
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [selectionToken, membershipId]
              properties:
                selectionToken: { type: string }
                membershipId: { type: string, format: uuid }
      responses:
        '200':
          description: Context-bound access/refresh token pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refresh
      summary: Rotate a single-use refresh token
      description: >
        Issues a new token pair and rotates the refresh token; reusing a spent
        refresh token revokes the whole token family. Public — no service token
        or identity headers.
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Rotated access/refresh token pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Revoke a refresh-token family (server-side logout)
      description: >
        Revokes the whole token family behind the supplied refresh token so the
        credential cannot be used again. Idempotent — an unknown or already-revoked
        token returns 204 and never reveals whether the token existed. Public — no
        service token or identity headers.
      x-status: built
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '204':
          description: The token family was revoked (or the token did not exist).
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }

  /subscribers:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [subscribers]
      operationId: listSubscribers
      summary: List subscribers (paginated)
      x-status: built
      parameters:
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of subscribers.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Subscriber' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
    post:
      tags: [subscribers]
      operationId: createSubscriber
      summary: Create a subscriber
      x-status: built
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, tierId]
              properties:
                name: { type: string }
                tierId: { type: string, format: uuid }
                meterId: { type: string }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /subscribers/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [subscribers]
      operationId: getSubscriber
      summary: Get a subscriber
      x-status: built
      responses:
        '200':
          description: Subscriber.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
    patch:
      tags: [subscribers]
      operationId: updateSubscriber
      summary: Update a subscriber (tier / details / status)
      x-status: built
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                name: { type: string }
                tierId: { type: string, format: uuid }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Updated subscriber.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Subscriber' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /subscribers/{id}/readings:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/pageParam'
      - $ref: 'components.yaml#/components/parameters/limitParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [readings]
      operationId: listSubscriberReadings
      summary: Reading history for a subscriber
      x-status: built
      responses:
        '200':
          description: Page of readings (newest first).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Reading' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /me/readings:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
      - $ref: 'components.yaml#/components/parameters/actorSubscriberIdHeader'
      - $ref: 'components.yaml#/components/parameters/pageParam'
      - $ref: 'components.yaml#/components/parameters/limitParam'
    get:
      tags: [readings]
      operationId: listMyReadings
      summary: Reading history for the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Page of readings for the subscriber identity.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Reading' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /tiers:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [tiers]
      operationId: listTiers
      summary: List amperage tiers
      x-status: built
      responses:
        '200':
          description: Tiers for the operator.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Tier' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
    post:
      tags: [tiers]
      operationId: createTier
      summary: Create an amperage tier and tariff override
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, amperage, standingFeeUsd, standingFeeLbp, perKwhRateUsd, perKwhRateLbp]
              properties:
                name: { type: string }
                amperage: { type: integer, minimum: 1 }
                tariffPolicyOverride:
                  oneOf:
                    - { $ref: 'components.yaml#/components/schemas/TariffPolicy' }
                    - { type: 'null' }
                standingFeeUsd: { type: number, minimum: 0 }
                standingFeeLbp: { type: integer, minimum: 0 }
                perKwhRateUsd: { type: number, minimum: 0 }
                perKwhRateLbp: { type: integer, minimum: 0 }
      responses:
        '201':
          description: Created tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /tiers/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [tiers]
      operationId: getTier
      summary: Get a tier
      x-status: built
      responses:
        '200':
          description: Tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
    patch:
      tags: [tiers]
      operationId: updateTier
      summary: Update tier pricing, policy override, or status
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                name: { type: string }
                amperage: { type: integer, minimum: 1 }
                tariffPolicyOverride:
                  oneOf:
                    - { $ref: 'components.yaml#/components/schemas/TariffPolicy' }
                    - { type: 'null' }
                standingFeeUsd: { type: number, minimum: 0 }
                standingFeeLbp: { type: integer, minimum: 0 }
                perKwhRateUsd: { type: number, minimum: 0 }
                perKwhRateLbp: { type: integer, minimum: 0 }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Updated tier.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Tier' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /readings:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    post:
      tags: [readings]
      operationId: recordReading
      summary: Record a meter reading
      description: >
        Persists a reading and emits `reading.recorded` after commit. Staff can
        record normal forward readings; backdated or rollback corrective
        readings require an admin identity.
      x-status: built
      x-emits-event: reading.recorded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [subscriberId, kwh, readingAt]
              properties:
                subscriberId: { type: string, format: uuid }
                kwh: { type: number, minimum: 0, description: Cumulative meter value in kWh. }
                readingAt: { type: string, format: date-time }
      responses:
        '201':
          description: Recorded reading.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Reading' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /billing-runs:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    post:
      tags: [billing]
      operationId: runBilling
      summary: Trigger the monthly billing run for a period
      description: >
        Computes per-subscriber consumption in a single transaction. Clean
        subscribers get ISSUED invoices and `invoice.issued`; uncomputable
        subscribers get NEEDS_REVIEW invoices and `invoice.status.changed`.
        Idempotent on the `Idempotency-Key` header so retries don't double-issue.
      x-status: built
      x-emits-event: [invoice.issued, invoice.status.changed]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [periodStart, periodEnd]
              properties:
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
      responses:
        '202':
          description: Billing run accepted; invoices issued or held for review.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [issued, issuedCount, needsReviewCount, periodStart, periodEnd]
                properties:
                  issued: { type: integer, minimum: 0, description: Legacy alias for issuedCount. }
                  issuedCount: { type: integer, minimum: 0, description: Number of payable ISSUED invoices. }
                  needsReviewCount: { type: integer, minimum: 0, description: Number of invoices held for operator review. }
                  periodStart: { type: string, format: date }
                  periodEnd: { type: string, format: date }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '409': { $ref: 'components.yaml#/components/responses/Conflict' }

  /invoices:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [billing]
      operationId: listInvoices
      summary: List invoices for the operator
      description: >
        Returns all invoices for the caller's operator. Period/status query
        filtering is a planned gateway/dashboard read concern (Phase 4-5) and is
        not yet implemented here.
      x-status: built
      parameters:
        - $ref: 'components.yaml#/components/parameters/pageParam'
        - $ref: 'components.yaml#/components/parameters/limitParam'
      responses:
        '200':
          description: Page of invoices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Invoice' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /invoices/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [billing]
      operationId: getInvoice
      summary: Get an invoice
      x-status: built
      responses:
        '200':
          description: Invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /invoices/{id}/reissue:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    post:
      tags: [billing]
      operationId: reissueInvoice
      summary: Re-issue a held invoice after corrective readings
      description: >
        Admin-only. Recomputes a NEEDS_REVIEW invoice from current readings,
        marks it ISSUED, and emits `invoice.issued`.
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      x-emits-event: invoice.issued
      responses:
        '200':
          description: Re-issued invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
        '409': { $ref: 'components.yaml#/components/responses/Conflict' }

  /invoices/{id}/void:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    post:
      tags: [billing]
      operationId: voidInvoice
      summary: Void a held or unpaid issued invoice
      description: >
        Admin-only. Voids a NEEDS_REVIEW invoice or an ISSUED invoice with no
        recorded payments, and emits `invoice.status.changed`.
      x-status: built
      x-required-roles: [OPERATOR_ADMIN]
      x-emits-event: invoice.status.changed
      responses:
        '200':
          description: Voided invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }
        '409': { $ref: 'components.yaml#/components/responses/Conflict' }

  /invoices/{id}/payments:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [payments]
      operationId: listInvoicePayments
      summary: Payments recorded against an invoice
      x-status: built
      responses:
        '200':
          description: Payments for the invoice.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Payment' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /payments:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    post:
      tags: [payments]
      operationId: recordPayment
      summary: Record a payment against an invoice
      description: Records a payment and emits `payment.received` after commit.
      x-status: built
      x-emits-event: payment.received
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [invoiceId, currency, tenderedAmount, method]
              properties:
                invoiceId: { type: string, format: uuid }
                currency: { $ref: 'components.yaml#/components/schemas/Currency' }
                tenderedAmount: { type: number, minimum: 0 }
                method: { type: string, enum: [CASH, WHISH] }
      responses:
        '201':
          description: Recorded payment.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Payment' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /me/invoices:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
      - $ref: 'components.yaml#/components/parameters/actorSubscriberIdHeader'
      - $ref: 'components.yaml#/components/parameters/pageParam'
      - $ref: 'components.yaml#/components/parameters/limitParam'
    get:
      tags: [billing]
      operationId: listMyInvoices
      summary: List invoices for the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Page of the subscriber's invoices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: 'components.yaml#/components/schemas/Invoice' }
                  meta: { $ref: 'components.yaml#/components/schemas/PageMeta' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }

  /me/invoices/{id}:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
      - $ref: 'components.yaml#/components/parameters/actorSubscriberIdHeader'
    get:
      tags: [billing]
      operationId: getMyInvoice
      summary: Get one invoice for the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Invoice.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/Invoice' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /me/invoices/{id}/payments:
    parameters:
      - $ref: 'components.yaml#/components/parameters/idParam'
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
      - $ref: 'components.yaml#/components/parameters/actorSubscriberIdHeader'
    get:
      tags: [payments]
      operationId: listMyInvoicePayments
      summary: List payments for one invoice owned by the subscriber caller
      x-status: built
      x-required-roles: [SUBSCRIBER]
      responses:
        '200':
          description: Payments for the invoice.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Payment' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: 'components.yaml#/components/responses/Forbidden' }
        '404': { $ref: 'components.yaml#/components/responses/NotFound' }

  /outages:
    parameters:
      - $ref: 'components.yaml#/components/parameters/operatorIdHeader'
      - $ref: 'components.yaml#/components/parameters/actorRoleHeader'
    get:
      tags: [outages]
      operationId: listOutages
      summary: List scheduled / active outages
      x-status: built
      responses:
        '200':
          description: Outages for the operator.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: 'components.yaml#/components/schemas/Outage' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }
    post:
      tags: [outages]
      operationId: scheduleOutage
      summary: Schedule a load-shedding window
      description: Persists an outage and emits `outage.scheduled` after commit.
      x-status: built
      x-emits-event: outage.scheduled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [startsAt, endsAt, reason]
              properties:
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
                reason: { type: string, enum: [FUEL, MAINTENANCE, GRID, OTHER] }
      responses:
        '201':
          description: Scheduled outage (matches the emitted event payload).
          content:
            application/json:
              schema: { $ref: '../events/outage-scheduled.schema.json#/properties/payload' }
        '400': { $ref: 'components.yaml#/components/responses/BadRequest' }
        '401': { $ref: 'components.yaml#/components/responses/Unauthorized' }

  /health:
    get:
      tags: [health]
      operationId: coreHealth
      summary: Liveness
      x-status: built
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/HealthStatus' }

  /ready:
    get:
      tags: [health]
      operationId: coreReady
      summary: Readiness
      x-status: built
      security: []
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/ReadyStatus' }
        '503':
          description: Service not ready.
          content:
            application/json:
              schema: { $ref: 'components.yaml#/components/schemas/ReadyStatus' }

  /actuator/health/{probe}:
    parameters:
      - name: probe
        in: path
        required: true
        schema: { type: string, enum: [liveness, readiness] }
    get:
      tags: [health]
      operationId: actuatorProbe
      summary: Spring Actuator liveness/readiness probe
      x-status: built
      security: []
      responses:
        '200':
          description: Probe status. Body shape is owned by Spring Actuator.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [UP, DOWN] }
        '503':
          description: Probe down.

components:
  securitySchemes:
    gatewayServiceAuth:
      $ref: 'components.yaml#/components/securitySchemes/gatewayServiceAuth'
  schemas:
    TokenPair:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
    MembershipView:
      type: object
      additionalProperties: false
      required: [membershipId, operatorId, operatorName, role]
      properties:
        membershipId: { type: string, format: uuid }
        operatorId: { type: string, format: uuid }
        operatorName: { type: string }
        role: { type: string, enum: [OPERATOR_ADMIN, OPERATOR_STAFF, SUBSCRIBER] }
        subscriberId:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
    LoginResult:
      type: object
      additionalProperties: false
      required: [contextSelectionRequired, memberships]
      description: >
        When `contextSelectionRequired` is true, `selectionToken` + `memberships`
        are populated and the caller must POST /auth/select-context. Otherwise
        `accessToken` + `refreshToken` are populated.
      properties:
        contextSelectionRequired: { type: boolean }
        selectionToken:
          oneOf:
            - { type: string }
            - { type: 'null' }
        accessToken:
          oneOf:
            - { type: string }
            - { type: 'null' }
        refreshToken:
          oneOf:
            - { type: string }
            - { type: 'null' }
        memberships:
          type: array
          items: { $ref: '#/components/schemas/MembershipView' }
